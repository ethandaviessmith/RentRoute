<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RentRoute</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <header>
    <h1>🗺 RentRoute</h1>
  </header>

  <section class="section">
    <label for="api-key-input">HERE API Key</label>
    <div class="key-row">
      <input type="password" id="api-key-input" placeholder="Paste your HERE API key here" autocomplete="off">
      <button id="btn-save-key" class="btn-primary">Save</button>
    </div>
    <p class="hint-text" id="key-bundled-hint" style="display:none">
      ✅ Key loaded from keys.js
    </p>
    <a class="hint-link" href="https://platform.here.com/sign-up" target="_blank">
      Get a free key ↗
    </a>

    <label for="sheets-url-input" style="margin-top:10px">Sheets Web App URL</label>
    <div class="key-row">
      <input type="text" id="sheets-url-input" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
      <button id="btn-save-sheets-url" class="btn-primary">Save</button>
    </div>
    <p class="hint-text" id="sheets-url-bundled-hint" style="display:none">
      ✅ URL loaded from keys.js
    </p>

    <label for="sheets-secret-input" style="margin-top:10px">Sheets Secret</label>
    <div class="key-row">
      <input type="password" id="sheets-secret-input" placeholder="Shared secret" autocomplete="off">
      <button id="btn-save-sheets-secret" class="btn-primary">Save</button>
    </div>
    <p class="hint-text" id="sheets-secret-bundled-hint" style="display:none">
      ✅ Secret loaded from keys.js
    </p>
  </section>

  <section class="section">
    <div class="section-header">
      <span>Destinations</span>
    </div>
    <div id="dest-list">
      <!-- destination cards inserted by popup.js -->
    </div>
    <button id="btn-add" class="btn-add">
      <span class="btn-icon">＋</span> Add Destination
    </button>
  </section>

  <script src="popup.js" type="module"></script>
</body>
</html>
